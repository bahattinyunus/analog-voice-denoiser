<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Voice Denoiser | Profesyonel Kontrol Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(0, 210, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .dashboard {
            width: 90%;
            max-width: 1100px;
            background: var(--card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 56px;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            font-weight: 600;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; filter: brightness(1.2); }
        }

        h1 {
            font-size: 2.75rem;
            margin: 8px 0 0 0;
            letter-spacing: -0.02em;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 40px;
        }

        .viz-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .spectrum-analyzer {
            height: 280px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .frequency-bar {
            flex: 1;
            background: linear-gradient(to top, var(--secondary), var(--primary));
            border-radius: 4px 4px 0 0;
            transition: height 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            opacity: 0.7;
        }

        .metrics-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 20px;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.04);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: #fff;
        }

        .action-bar {
            margin-top: 56px;
            display: flex;
            gap: 16px;
        }

        .button {
            padding: 14px 32px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .button-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .button-primary:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .button-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-main);
        }

        .button-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div>
                <div class="system-status">
                    <div class="status-indicator"></div>
                    Sinyal İşlemci Aktif
                </div>
                <h1>ANALOG CORE v1.0</h1>
            </div>
            <div style="text-align: right">
                <div class="metric-label">Proje Durumu</div>
                <div class="metric-value" style="font-size: 1.25rem; color: var(--primary)">AKTİF ARAŞTIRMA</div>
            </div>
        </div>

        <div class="main-content">
            <div class="viz-container">
                <div class="metric-label">Canlı Spektral Geribildirim</div>
                <div class="spectrum-analyzer" id="analyzer">
                    <!-- JavaScript tarafından doldurulacak -->
                </div>
            </div>
            <div class="metrics-panel">
                <div class="metric-card">
                    <div class="metric-label">SNR İyileştirmesi</div>
                    <div class="metric-value" id="snr-metric">+44.2 dB</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Atmosferik Yoğunluk</div>
                    <div class="metric-value">0.124 σ</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Gecikme Profili</div>
                    <div class="metric-value" style="color: #4ade80">0.8 ms</div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="button button-primary">Gürültü Baskılamayı Başlat</button>
            <button class="button button-outline">Gelişmiş Analitik</button>
            <button class="button button-outline">Uzak Düğümü Senkronize Et</button>
        </div>
    </div>

    <script>
        const analyzer = document.getElementById('analyzer');
        const barCount = 48;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'frequency-bar';
            analyzer.appendChild(bar);
            bars.push(bar);
        }

        function updateViz() {
            bars.forEach((bar, index) => {
                const targetHeight = Math.random() * 85 + 5;
                bar.style.height = `${targetHeight}%`;
                const opacity = 0.4 + (targetHeight / 100) * 0.6;
                bar.style.opacity = opacity;
            });

            if (Math.random() > 0.8) {
                const snr = (40 + Math.random() * 8).toFixed(1);
                document.getElementById('snr-metric').innerText = `+${snr} dB`;
            }

            requestAnimationFrame(() => {
                setTimeout(updateViz, 120);
            });
        }

        updateViz();
    </script>
</body>
</html>
